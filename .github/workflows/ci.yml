name: ci

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        type: choice
        options: [smoke, extended]
        default: smoke
  schedule:
    # Nightly extended run only — live-API etiquette (spec Section 9):
    # do not hammer the public endpoint on every commit.
    - cron: '17 2 * * *'

jobs:
  smoke:
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.suite == 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Push-triggered job (live-API etiquette, spec Section 9): a second push
    # before the first run finishes cancels the stale run rather than
    # racing two live-API suites in parallel.
    concurrency:
      group: ci-smoke-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cucumber-report-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/

  extended:
    # Nightly, or dispatched on demand — used for each @extended unit's DoD runs.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == 'extended')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:extended
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cucumber-report-extended-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/
