name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly extended run only — live-API etiquette (spec Section 9):
    # do not hammer the public endpoint on every commit.
    - cron: '17 2 * * *'

jobs:
  smoke:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cucumber-report-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/

  extended:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:extended
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cucumber-report-extended-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/
